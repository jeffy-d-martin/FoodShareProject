<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Annapoorna Connect</title>
    <link rel="stylesheet" href="css/style.css?v=9">
    <link rel="stylesheet" href="css/login.css?v=9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .forgot-container {
            max-width: 450px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        .hr-style-title {
            font-size: 24px;
            font-weight: 700;
            color: #2e3d49;
            margin-bottom: 10px;
            text-align: center;
        }
        .hr-style-subtitle {
            font-size: 14px;
            color: #738f93;
            text-align: center;
            margin-bottom: 30px;
        }
        .captcha-container {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .captcha-container:hover {
            border-color: #4C7D55;
            background: #fff;
        }
        .captcha-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #ccc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .captcha-checkbox.checked {
            background: #4C7D55;
            border-color: #4C7D55;
        }
        .captcha-checkbox.checked::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }
        .captcha-text {
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        .captcha-logo {
            margin-left: auto;
            opacity: 0.5;
        }
        .step-hidden {
            display: none;
        }
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .otp-digit {
            width: 45px;
            height: 55px;
            border: 2px solid #eee;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #4C7D55;
            outline: none;
            transition: all 0.2s;
        }
        .otp-digit:focus {
            border-color: #4C7D55;
            box-shadow: 0 0 10px rgba(76, 125, 85, 0.1);
        }
        .back-to-login {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #4C7D55;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body style="background-color: #f4f7f6; font-family: 'Inter', sans-serif;">

    <div class="forgot-container">
        <!-- Step 1: Identify User -->
        <div id="forgot-step-1">
            <h1 class="hr-style-title">Forgot Password?</h1>
            <p class="hr-style-subtitle">Enter your email or phone number and we'll send you an OTP to reset your password.</p>
            
            <div class="input-group" style="margin-bottom: 20px;">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 7.00005L10.2 11.65C11.2667 12.45 12.7333 12.45 13.8 11.65L20 7" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <rect x="3" y="5" width="18" height="14" rx="2" stroke="#888" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </span>
                <input type="text" id="recover-id" placeholder="Email or 10-digit Phone" required>
            </div>

            <!-- HackerRank Style Robot Verification -->
            <div class="captcha-container" id="captcha-box">
                <div class="captcha-checkbox" id="captcha-check"></div>
                <span class="captcha-text">I'm not a robot</span>
                <div class="captcha-logo">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#ccc" stroke-width="2"/>
                        <path d="M12 6V12L16 14" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>

            <button type="button" class="login-btn-submit" id="send-otp-btn" style="width: 100%;" disabled>Send Reset OTP</button>
        </div>

        <!-- Step 2: Verify OTP -->
        <div id="forgot-step-2" class="step-hidden">
            <h1 class="hr-style-title">Verify OTP</h1>
            <p class="hr-style-subtitle" id="otp-subtitle">We've sent a 4-digit code to your ID. Please enter it below.</p>
            
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
                <input type="text" maxlength="1" class="otp-digit">
            </div>

            <button type="button" class="login-btn-submit" id="verify-otp-btn" style="width: 100%;">Verify & Reset</button>
        </div>

        <!-- Step 3: Set New Password -->
        <div id="forgot-step-3" class="step-hidden">
            <h1 class="hr-style-title">Create New Password</h1>
            <p class="hr-style-subtitle">Your identity is verified. Please choose a strong password.</p>
            
            <div class="input-group" style="margin-bottom: 15px;">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="11" width="14" height="10" rx="2" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M8 11V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V11" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </span>
                <input type="password" id="new-pwd" placeholder="New Password (min 8 chars)" required>
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <span class="icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="11" width="14" height="10" rx="2" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M8 11V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V11" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </span>
                <input type="password" id="confirm-pwd" placeholder="Confirm New Password" required>
            </div>

            <div id="reset-error" style="color: #d9534f; font-size: 13px; margin-bottom: 10px; text-align: center;"></div>

            <button type="button" class="login-btn-submit" id="save-pwd-btn" style="width: 100%;">Update Password</button>
        </div>

        <a href="login.html" class="back-to-login">Back to Login</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const captchaBox = document.getElementById('captcha-box');
            const captchaCheck = document.getElementById('captcha-check');
            const sendBtn = document.getElementById('send-otp-btn');
            const recoverId = document.getElementById('recover-id');
            const otpSubtitle = document.getElementById('otp-subtitle');
            
            const step1 = document.getElementById('forgot-step-1');
            const step2 = document.getElementById('forgot-step-2');
            const step3 = document.getElementById('forgot-step-3');

            let isCaptchaVerified = false;

            // Simulated Robot Verification
            captchaBox.addEventListener('click', () => {
                if(isCaptchaVerified) return;
                
                captchaCheck.innerHTML = '<div style="width: 12px; height: 12px; border: 2px solid #4C7D55; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite;"></div>';
                
                setTimeout(() => {
                    captchaCheck.innerHTML = '';
                    captchaCheck.classList.add('checked');
                    isCaptchaVerified = true;
                    validateStep1();
                    
                    // Small "WOW" animation for checkmark
                    gsap.from(captchaCheck, { scale: 1.5, duration: 0.3, ease: "back.out" });
                }, 800);
            });

            // Enforce Input Restrictions (Only 10 digits/Numbers)
            recoverId.addEventListener('input', (e) => {
                let val = e.target.value;
                // If it looks like they are typing a phone number (starting with digit)
                if(/^\d/.test(val)) {
                    val = val.replace(/\D/g, ''); // Remove non-numeric
                    if(val.length > 0 && !/[6-9]/.test(val[0])) {
                        val = ''; // Block non-Indian starters
                    }
                    if(val.length > 10) val = val.substring(0, 10);
                    e.target.value = val;
                }
                validateStep1();
            });

            function validateStep1() {
                const val = recoverId.value.trim();
                const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
                const isPhone = /^[6-9]\d{9}$/.test(val);
                
                if((isEmail || isPhone) && isCaptchaVerified) {
                    sendBtn.disabled = false;
                } else {
                    sendBtn.disabled = true;
                }
            }

            // Transition to Step 2 with Database Verification
            sendBtn.addEventListener('click', async () => {
                const identifier = recoverId.value.trim();
                const isPhone = /^\d+$/.test(identifier);
                
                try {
                    sendBtn.textContent = "Verifying...";
                    sendBtn.disabled = true;

                    const response = await fetch('/api/verify-identifier', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identifier: identifier })
                    });

                    if(response.ok) {
                        // Set dynamic subtitle
                        if(isPhone) {
                            otpSubtitle.textContent = "We've sent a 4-digit code to your Mobile Number via SMS.";
                        } else {
                            otpSubtitle.textContent = "We've sent a 4-digit code to your Email Address.";
                        }

                        gsap.to(step1, { opacity: 0, x: -20, duration: 0.4, onComplete: () => {
                            step1.classList.add('step-hidden');
                            step2.classList.remove('step-hidden');
                            gsap.from(step2, { opacity: 0, x: 20, duration: 0.4 });
                        }});
                    } else {
                        const data = await response.json();
                        alert(data.detail || "Account not found.");
                        captchaCheck.classList.remove('checked');
                        isCaptchaVerified = false;
                        validateStep1();
                    }
                } catch (err) {
                    alert("Connection error. Please try again.");
                } finally {
                    sendBtn.textContent = "Send Reset OTP";
                    sendBtn.disabled = false;
                }
            });

            // Transition to Step 3 (Verify OTP)
            const otpDigits = document.querySelectorAll('.otp-digit');
            document.getElementById('verify-otp-btn').addEventListener('click', () => {
                const otp = Array.from(otpDigits).map(d => d.value).join('');
                if(otp === "1234") {
                    gsap.to(step2, { opacity: 0, y: -20, duration: 0.4, onComplete: () => {
                        step2.classList.add('step-hidden');
                        step3.classList.remove('step-hidden');
                        gsap.from(step3, { opacity: 0, y: 20, duration: 0.4 });
                    }});
                } else {
                    alert("Invalid OTP. Hint: 1234");
                }
            });

            // Final Password Reset
            const saveBtn = document.getElementById('save-pwd-btn');
            const newPwd = document.getElementById('new-pwd');
            const confirmPwd = document.getElementById('confirm-pwd');
            const resetError = document.getElementById('reset-error');

            saveBtn.addEventListener('click', async () => {
                resetError.textContent = "";

                if(newPwd.value.length < 8) {
                    resetError.textContent = "Password must be at least 8 characters.";
                    return;
                }
                if(newPwd.value !== confirmPwd.value) {
                    resetError.textContent = "Passwords do not match.";
                    return;
                }

                try {
                    saveBtn.textContent = "Updating...";
                    saveBtn.disabled = true;

                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            identifier: recoverId.value.trim(),
                            new_password: newPwd.value
                        })
                    });

                    if(response.ok) {
                        alert("Password successfully updated! Redirecting to login...");
                        window.location.href = "login.html";
                    } else {
                        const data = await response.json();
                        resetError.textContent = data.detail || "Failed to update password.";
                    }
                } catch (err) {
                    resetError.textContent = "Connection error. Please try again.";
                } finally {
                    saveBtn.textContent = "Update Password";
                    saveBtn.disabled = false;
                }
            });

            // OTP Input Auto-focus logic already existing below
            otpDigits.forEach((digit, idx) => {
                digit.addEventListener('input', (e) => {
                    if(e.target.value.length === 1 && idx < otpDigits.length - 1) {
                        otpDigits[idx + 1].focus();
                    }
                });
                digit.addEventListener('keydown', (e) => {
                    if(e.key === "Backspace" && !e.target.value && idx > 0) {
                        otpDigits[idx - 1].focus();
                    }
                });
            });
        });
    </script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
